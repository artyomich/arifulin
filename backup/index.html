<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Артём Арифулин | ML Engineer & Backend Developer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --secondary-text: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .role {
            color: var(--accent-color);
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bio {
            color: var(--secondary-text);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        a {
            color: var(--text-color);
            text-decoration: none;
            border: 1px solid var(--secondary-text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        a:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: rgba(56, 189, 248, 0.1);
        }
        .email-link {
            border-color: var(--accent-color);
            background-color: rgba(56, 189, 248, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Артём Арифулин</h1>
        <div class="role">ML Engineer / Python Backend</div>
        
        <p class="bio">
            20+ лет в разработке высоконагруженных систем. <br>
            Специализируюсь на интеграции локальных LLM, агентных системах (DSPy/LangChain) 
            и Linux-инфраструктуре.
        </p>

        <div class="links">
            <a href="https://github.com/artyomich" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/arifulin" target="_blank">LinkedIn</a>
            <a href="mailto:arifulin@gmail.com" class="email-link">arifulin@gmail.com</a>
        </div>
    </div>
</body>
</html>
